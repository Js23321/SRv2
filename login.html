<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Revisions V2</title>
<link id="favicon" rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --accent:#ffffff;--accent-glow:rgba(255,255,255,0.06);--accent-dim:rgba(255,255,255,0.28);
  --text:#f0f0f0;--text-muted:#888;--text-dim:#444;
  --danger:#f7634f;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
}
[data-theme="blue"]  {--accent:#4f8ef7;--accent-glow:rgba(79,142,247,0.12);--accent-dim:rgba(79,142,247,0.4);}
[data-theme="purple"]{--accent:#9b6ef7;--accent-glow:rgba(155,110,247,0.12);--accent-dim:rgba(155,110,247,0.4);}
[data-theme="red"]   {--accent:#f74f6e;--accent-glow:rgba(247,79,110,0.12);--accent-dim:rgba(247,79,110,0.4);}
[data-theme="green"] {--accent:#4ff79a;--accent-glow:rgba(79,247,154,0.12);--accent-dim:rgba(79,247,154,0.4);}
[data-theme="amber"] {--accent:#f7c34f;--accent-glow:rgba(247,195,79,0.12);--accent-dim:rgba(247,195,79,0.4);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
  display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:none;
  transition:background .4s ease;}


/* BG CANVAS */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* CARD */
.card{position:relative;z-index:10;width:100%;max-width:400px;margin:1rem;
  background:rgba(17,17,17,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-radius:16px;padding:2.25rem 2rem 1.75rem;
  animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;cursor:none;}

@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* LOGO */
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;}
.logo-mark{width:36px;height:36px;border:1px solid var(--border2);border-radius:9px;
  display:flex;align-items:center;justify-content:center;background:var(--accent-glow);}
.logo-mark svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.logo-tag{font-size:10px;color:var(--text-muted);font-family:var(--mono);}

/* HEADING */
.heading{font-size:21px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.02em;}
.subhead{font-size:12px;color:var(--text-muted);font-family:var(--mono);margin-bottom:1.5rem;}

/* FIELDS */
.field{margin-bottom:1rem;}
label{display:block;font-size:10px;font-family:var(--mono);color:var(--text-muted);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;stroke:var(--text-dim);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;pointer-events:none;}
input[type="text"],input[type="password"]{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px 10px 36px;color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;cursor:none;
  transition:border-color .2s,box-shadow .2s;}
input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow);}
input:focus~.input-icon{stroke:var(--accent);}
.toggle-pw{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:none;padding:4px;display:flex;align-items:center;}
.toggle-pw svg{width:14px;height:14px;stroke:var(--text-dim);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;pointer-events:none;}
.toggle-pw:hover svg{stroke:var(--text-muted);}

/* MESSAGES */
.msg-box{display:none;align-items:center;gap:8px;border-radius:8px;padding:9px 12px;
  font-size:12px;color:var(--danger);font-family:var(--mono);margin-bottom:1rem;
  background:rgba(247,99,79,0.07);border:1px solid rgba(247,99,79,0.2);}
.msg-box.show{display:flex;animation:shake .35s ease;}
.msg-box svg{width:13px;height:13px;stroke:var(--danger);fill:none;stroke-width:2;flex-shrink:0;}
.locked-box{display:none;flex-direction:column;align-items:center;text-align:center;gap:7px;
  border-radius:8px;padding:1rem;margin-bottom:1rem;
  background:rgba(247,99,79,0.06);border:1px solid rgba(247,99,79,0.2);}
.locked-box.show{display:flex;}
.locked-box svg{width:24px;height:24px;stroke:var(--danger);fill:none;stroke-width:2;}
.locked-box p{font-size:12px;color:var(--danger);font-family:var(--mono);}
.locked-box span{font-size:11px;color:var(--text-muted);font-family:var(--mono);}

@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

/* BUTTON */
.btn{width:100%;padding:11px;background:var(--accent);color:#000;border:none;
  border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:700;
  letter-spacing:.02em;cursor:none;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.85;}.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.3;cursor:none;transform:none;}
.btn .spinner{display:none;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);
  border-top-color:#000;border-radius:50%;animation:spin .5s linear infinite;margin:0 auto;}
.btn.loading .btn-text{display:none;}.btn.loading .spinner{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:8px;margin:1.25rem 0 1rem;
  color:var(--text-dim);font-size:10px;font-family:var(--mono);letter-spacing:.06em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* THEMES */
.themes{display:flex;align-items:center;justify-content:center;gap:8px;}
.themes-label{font-size:10px;color:var(--text-muted);font-family:var(--mono);margin-right:2px;}
.theme-dot{width:16px;height:16px;border-radius:50%;border:2px solid transparent;cursor:none;transition:transform .15s,border-color .15s;}
.theme-dot:hover{transform:scale(1.2);}
.theme-dot.active{border-color:var(--text);transform:scale(1.15);}
.theme-dot[data-t="bw"]    {background:linear-gradient(135deg,#fff 50%,#222 50%);}
.theme-dot[data-t="blue"]  {background:#4f8ef7;}
.theme-dot[data-t="purple"]{background:#9b6ef7;}
.theme-dot[data-t="red"]   {background:#f74f6e;}
.theme-dot[data-t="green"] {background:#4ff79a;}
.theme-dot[data-t="amber"] {background:#f7c34f;}

/* STOP OVERLAY */
#stop-overlay{display:none;position:fixed;inset:0;z-index:9998;background:#000;
  flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;text-align:center;padding:2rem;}
#stop-overlay.active{display:flex;}
.stop-icon{width:56px;height:56px;border-radius:50%;background:rgba(247,99,79,.08);
  border:1.5px solid var(--danger);display:flex;align-items:center;justify-content:center;
  animation:pulse 2s ease-in-out infinite;}
.stop-icon svg{width:28px;height:28px;stroke:var(--danger);fill:none;stroke-width:2;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(247,99,79,.3);}50%{box-shadow:0 0 0 12px rgba(247,99,79,0);}}
.stop-title{font-size:24px;font-weight:800;color:var(--text);}
.stop-sub{font-size:13px;color:var(--text-muted);font-family:var(--mono);max-width:280px;line-height:1.6;}

/* BG CANVASES */
body{cursor:default!important;}
*{cursor:default!important;}
input,textarea,select{cursor:text!important;}
a,button,.cat-card,.game-card,.s-dot,.theme-dot,.toggle-btn,.icon-btn,.nav-btn,.back-btn,.pill,.btn-save,.btn-reset,.btn-primary,.btn-danger,.btn-secondary,.editor-run,.editor-clear,.editor-tab,.panel-close{cursor:pointer!important;}
main,nav,.panel,.overlay{position:relative;z-index:2;}
.toggle-btn{padding:4px 12px;border-radius:20px;font-size:10px;font-family:var(--mono);font-weight:700;border:none;background:var(--accent);color:#000;cursor:pointer;transition:background .2s,color .2s;}
</style>
</head>
<body>
<canvas id="srv2-bg" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
<canvas id="srv2-fx" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></canvas>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<canvas id="bg-canvas"></canvas>

<div id="stop-overlay">
  <div class="stop-icon"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg></div>
  <p class="stop-title">Session Ended</p>
  <p class="stop-sub">Your session has been stopped. Contact the owner to continue.</p>
</div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg></div>
    <div><div class="logo-name">Science Revisions</div><div class="logo-tag">// v2.0</div></div>
  </div>

  <h1 class="heading">Welcome back</h1>
  <p class="subhead">Sign in with your assigned credentials</p>

  <div class="msg-box" id="error-box">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
    <span id="error-text">Incorrect username or password.</span>
  </div>
  <div class="locked-box" id="locked-box">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    <p>Account locked.</p><span>Contact the site owner to regain access.</span>
  </div>

  <div class="field">
    <label for="username">Username</label>
    <div class="input-wrap">
      <input type="text" id="username" placeholder="Your username" autocomplete="username">
      <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <button class="toggle-pw" id="toggle-pw" type="button" tabindex="-1">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>
  </div>

  <button class="btn" id="login-btn" type="button">
    <span class="btn-text">Sign In</span><div class="spinner"></div>
  </button>

  <div class="divider">theme</div>
  <div class="themes">
    <span class="themes-label">color —</span>
    <div class="theme-dot active" data-t="bw"></div>
    <div class="theme-dot" data-t="blue"></div>
    <div class="theme-dot" data-t="purple"></div>
    <div class="theme-dot" data-t="red"></div>
    <div class="theme-dot" data-t="green"></div>
    <div class="theme-dot" data-t="amber"></div>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded',function(){
  var cfg={apiKey:"AIzaSyAa-fN7WNj46UznXEOO0CsyKX8j8kCokhQ",authDomain:"science-revisions-v2.firebaseapp.com",projectId:"science-revisions-v2",storageBucket:"science-revisions-v2.firebasestorage.app",messagingSenderId:"950664248443",appId:"1:950664248443:web:8e57782d5b0ba7ff6cf6de"};
  firebase.initializeApp(cfg);
  var auth=firebase.auth(),db=firebase.firestore();


  /* KINETIC DOTS - white always, bg changes with theme */
  var canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  var W,H,dots=[],mouse={x:-9999,y:-9999};
  var BG_C={bw:'#080808',blue:'#03050f',purple:'#06030f',red:'#0f0305',green:'#030f07',amber:'#0f0a03'};
  var ACCENT_C={bw:'rgba(255,255,255,.9)',blue:'rgba(79,142,247,.9)',purple:'rgba(155,110,247,.9)',red:'rgba(247,79,110,.9)',green:'rgba(79,247,154,.9)',amber:'rgba(247,195,79,.9)'};
  var ACCENT_SHADOW={bw:'0 0 6px 2px rgba(255,255,255,.4)',blue:'0 0 6px 2px rgba(79,142,247,.5)',purple:'0 0 6px 2px rgba(155,110,247,.5)',red:'0 0 6px 2px rgba(247,79,110,.5)',green:'0 0 6px 2px rgba(79,247,154,.5)',amber:'0 0 6px 2px rgba(247,195,79,.5)'};

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mkDot(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.6+.8,p:Math.random()*Math.PI*2};}
  function burst(x,y){dots.forEach(function(d){var dx=d.x-x,dy=d.y-y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<160&&dist>0){var f=(160-dist)/160*5;d.vx+=(dx/dist)*f;d.vy+=(dy/dist)*f;}});}
  function init(){resize();dots=Array.from({length:75},mkDot);}

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<dots.length;i++){for(var j=i+1;j<dots.length;j++){
      var dx=dots[i].x-dots[j].x,dy=dots[i].y-dots[j].y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){ctx.beginPath();ctx.moveTo(dots[i].x,dots[i].y);ctx.lineTo(dots[j].x,dots[j].y);
        ctx.strokeStyle='rgba(255,255,255,'+(1-dist/120)*.12+')';ctx.lineWidth=.6;ctx.stroke();}
    }}
    dots.forEach(function(d){
      d.p+=.016;var pr=d.r+Math.sin(d.p)*.5;
      var mdx=d.x-mouse.x,mdy=d.y-mouse.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<100&&md>0){var f=(100-md)/100*3;d.vx+=(mdx/md)*f*.05;d.vy+=(mdy/md)*f*.05;}
      d.vx*=.988;d.vy*=.988;
      var sp=Math.sqrt(d.vx*d.vx+d.vy*d.vy);if(sp>2.5){d.vx=d.vx/sp*2.5;d.vy=d.vy/sp*2.5;}
      d.x+=d.vx;d.y+=d.vy;
      if(d.x<-5)d.x=W+5;if(d.x>W+5)d.x=-5;if(d.y<-5)d.y=H+5;if(d.y>H+5)d.y=-5;
      var g=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,pr*3.5);
      g.addColorStop(0,'rgba(255,255,255,0.18)');g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(d.x,d.y,pr*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(d.x,d.y,pr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener('click',function(e){burst(e.clientX,e.clientY);});
  window.addEventListener('touchstart',function(e){var t=e.touches[0];burst(t.clientX,t.clientY);},{passive:true});
  window.addEventListener('touchmove',function(e){var t=e.touches[0];mouse.x=t.clientX;mouse.y=t.clientY;},{passive:true});
  init();draw();

  /* THEME */
  function applyTheme(t){
    document.querySelectorAll('.theme-dot').forEach(function(d){d.classList.remove('active');});
    var dot=document.querySelector('.theme-dot[data-t="'+t+'"]');if(dot)dot.classList.add('active');
    if(t==='bw'){document.body.removeAttribute('data-theme');}else{document.body.dataset.theme=t;}
    document.body.style.background=BG_C[t]||BG_C.bw;
    cur.style.background=ACCENT_C[t]||ACCENT_C.bw;
    cur.style.boxShadow=ACCENT_SHADOW[t]||ACCENT_SHADOW.bw;
    localStorage.setItem('srv2-theme',t);
  }
  document.querySelectorAll('.theme-dot').forEach(function(d){
    d.addEventListener('click',function(e){e.stopPropagation();applyTheme(d.dataset.t);});
  });
  applyTheme(localStorage.getItem('srv2-theme')||'bw');

  /* PASSWORD TOGGLE */
  var pwInput=document.getElementById('password');
  var EO='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
  var EC='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
  document.getElementById('toggle-pw').addEventListener('click',function(e){
    e.stopPropagation();var h=pwInput.type==='password';pwInput.type=h?'text':'password';
    document.getElementById('eye-icon').innerHTML=h?EC:EO;
  });

  /* LOGIN */
  var btn=document.getElementById('login-btn');
  var errorBox=document.getElementById('error-box');
  var errorText=document.getElementById('error-text');
  var lockedBox=document.getElementById('locked-box');
  function showError(msg){errorText.textContent=msg;lockedBox.classList.remove('show');errorBox.classList.remove('show');void errorBox.offsetWidth;errorBox.classList.add('show');}
  function showLocked(){errorBox.classList.remove('show');lockedBox.classList.add('show');}

  btn.addEventListener('click',async function(){
    var username=document.getElementById('username').value.trim().toLowerCase();
    var password=pwInput.value;
    if(!username||!password){showError('Please fill in all fields.');return;}
    btn.classList.add('loading');btn.disabled=true;
    errorBox.classList.remove('show');lockedBox.classList.remove('show');
    try{
      var snap=await db.collection('users').where('username','==',username).limit(1).get();
      if(snap.empty){btn.classList.remove('loading');btn.disabled=false;showError('Incorrect username or password.');return;}
      var doc=snap.docs[0],data=doc.data();
      if(data.locked===true){btn.classList.remove('loading');btn.disabled=false;showLocked();return;}
      await auth.signInWithEmailAndPassword(data.email,password);
      sessionStorage.setItem('srv2-role',data.role);
      sessionStorage.setItem('srv2-username',data.username);
      sessionStorage.setItem('srv2-uid',doc.id);
      if(data.role==='owner')window.location.href='owner.html';
      else if(data.role==='admin')window.location.href='admin.html';
      else window.location.href='home.html';
    }catch(err){
      btn.classList.remove('loading');btn.disabled=false;
      if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential')showError('Incorrect username or password.');
      else if(err.code==='auth/too-many-requests')showError('Too many attempts. Try again later.');
      else{showError('Something went wrong.');console.error(err);}
    }
  });
  document.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});
  auth.onAuthStateChanged(function(user){
    if(user){var r=sessionStorage.getItem('srv2-role');if(r==='owner')window.location.href='owner.html';else if(r==='admin')window.location.href='admin.html';else if(r)window.location.href='home.html';}
  });
});
</script>
</body>
</html>
